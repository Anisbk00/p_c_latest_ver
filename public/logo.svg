<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e5e5e5"/>
      <stop offset="100%" style="stop-color:#a3a3a3"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0a0a0a"/>
  <!-- Stylized dumbbell icon - minimal and elegant -->
  <g fill="url(#logoGradient)">
    <!-- Left weight plate -->
    <rect x="80" y="196" width="40" height="120" rx="8" ry="8"/>
    <!-- Left inner plate -->
    <rect x="130" y="216" width="24" height="80" rx="4" ry="4"/>
    <!-- Bar -->
    <rect x="154" y="238" width="204" height="36" rx="6" ry="6"/>
    <!-- Right inner plate -->
    <rect x="358" y="216" width="24" height="80" rx="4" ry="4"/>
    <!-- Right weight plate -->
    <rect x="392" y="196" width="40" height="120" rx="8" ry="8"/>
  </g>
  <!-- Accent line - representing progress -->
  <line x1="200" y1="330" x2="312" y2="330" stroke="url(#logoGradient)" stroke-width="4" stroke-linecap="round"/>
</svg>