<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Progress Companion</title>
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #1a1a1a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --accent: #f97316;
      --accent-glow: rgba(249, 115, 22, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .container {
      max-width: 400px;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 2rem;
      filter: drop-shadow(0 0 20px var(--accent-glow));
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, var(--text-primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg-secondary);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    .pulse {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.2);
      }
    }

    p {
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .info-box {
      background: var(--bg-secondary);
      border: 1px solid rgba(249, 115, 22, 0.2);
      border-radius: 12px;
      padding: 1.25rem;
      margin-top: 1.5rem;
    }

    .info-box h3 {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .info-box ul {
      list-style: none;
      text-align: left;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .info-box li {
      padding: 0.25rem 0;
      padding-left: 1.25rem;
      position: relative;
    }

    .info-box li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .retry-button {
      margin-top: 2rem;
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .retry-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .retry-button:active {
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .pulse {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="45" stroke="#f97316" stroke-width="4" fill="none" opacity="0.3"/>
      <circle cx="50" cy="50" r="35" stroke="#f97316" stroke-width="4" fill="none" opacity="0.5"/>
      <circle cx="50" cy="50" r="25" stroke="#f97316" stroke-width="4" fill="none"/>
      <circle cx="50" cy="50" r="8" fill="#f97316"/>
    </svg>

    <h1>You're Offline</h1>

    <div class="status-badge">
      <span class="pulse"></span>
      <span>Waiting for connection</span>
    </div>

    <p>
      It looks like you've lost your internet connection. 
      Don't worry - your data is safe and will sync automatically when you're back online.
    </p>

    <div class="info-box">
      <h3>While Offline</h3>
      <ul>
        <li>Your data is saved locally</li>
        <li>Changes sync when connected</li>
        <li>Previous data still accessible</li>
      </ul>
    </div>

    <button class="retry-button" onclick="window.location.reload()">
      Try Again
    </button>
  </div>

  <script>
    // Auto-reload when back online
    window.addEventListener('online', () => {
      window.location.reload();
    });

    // Check connection periodically
    setInterval(() => {
      if (navigator.onLine) {
        window.location.reload();
      }
    }, 5000);
  </script>
</body>
</html>
